services:
  backend:
    build:
      context: ./backend
    ports:
      - "5001:5000"
    depends_on:
      - mongo
    environment:
      - DATABASE_URL=mongodb://mongo:27017/inventory
      - JWT_SECRET=your_secret_key
      - PORT=5000

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:5001/api

  mongo:
    image: mongo:6
    container_name: ims-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
